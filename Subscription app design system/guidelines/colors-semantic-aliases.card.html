<!-- @dsCard group="Colors" viewport="700x180" name="Surface & text aliases" subtitle="Theme-aware semantic tokens" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:18px 20px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .col{display:flex;flex-direction:column;gap:10px;}
  .lbl{font-size:11px;color:var(--text-tertiary);letter-spacing:.04em;text-transform:uppercase;font-weight:600;}
  
</style>
</head>
<body><div class="wrap"><div class="row">
   <div class="col"><span class="lbl">app</span><div style="width:70px;height:44px;border-radius:10px;background:var(--bg-app);border:1px solid var(--border-default)"></div></div>
   <div class="col"><span class="lbl">surface</span><div style="width:70px;height:44px;border-radius:10px;background:var(--bg-surface);border:1px solid var(--border-default)"></div></div>
   <div class="col"><span class="lbl">sunken</span><div style="width:70px;height:44px;border-radius:10px;background:var(--bg-sunken);border:1px solid var(--border-default)"></div></div>
   <div class="col" style="gap:4px;margin-left:8px">
     <div style="color:var(--text-primary);font-weight:700;font-size:15px">Primary text</div>
     <div style="color:var(--text-secondary);font-size:14px">Secondary text</div>
     <div style="color:var(--text-tertiary);font-size:13px">Tertiary text</div>
   </div>
 </div></div></body>
</html>
