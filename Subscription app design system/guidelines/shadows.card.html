<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:18px 20px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .col{display:flex;flex-direction:column;gap:10px;}
  .lbl{font-size:11px;color:var(--text-tertiary);letter-spacing:.04em;text-transform:uppercase;font-weight:600;}
  
</style>
</head>
<body><div class="wrap"><div class="row" style="gap:24px;padding:8px 4px">
   <div class="col" style="gap:8px;align-items:center">
     <div style="width:84px;height:60px;background:var(--bg-surface);border-radius:var(--radius-md);box-shadow:var(--shadow-xs)"></div>
     <div style="font-size:11px;color:var(--text-tertiary);font-weight:600">xs</div>
   </div>
   <div class="col" style="gap:8px;align-items:center">
     <div style="width:84px;height:60px;background:var(--bg-surface);border-radius:var(--radius-md);box-shadow:var(--shadow-sm)"></div>
     <div style="font-size:11px;color:var(--text-tertiary);font-weight:600">sm</div>
   </div>
   <div class="col" style="gap:8px;align-items:center">
     <div style="width:84px;height:60px;background:var(--bg-surface);border-radius:var(--radius-md);box-shadow:var(--shadow-md)"></div>
     <div style="font-size:11px;color:var(--text-tertiary);font-weight:600">md</div>
   </div>
   <div class="col" style="gap:8px;align-items:center">
     <div style="width:84px;height:60px;background:var(--bg-surface);border-radius:var(--radius-md);box-shadow:var(--shadow-lg)"></div>
     <div style="font-size:11px;color:var(--text-tertiary);font-weight:600">lg</div>
   </div></div></div></body>
</html>
