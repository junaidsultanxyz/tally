<!-- @dsCard group="Components" viewport="700x260" name="Core — Buttons, Badges, Segmented" subtitle="Button variants, status badges, segmented control" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
 html,body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-sans)}
 .wrap{padding:20px}
 .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
 .lbl{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;font-weight:600;width:100%;margin-top:4px}
 .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-sans);font-weight:600;border-radius:var(--radius-pill);cursor:pointer;min-height:44px;padding:0 20px;font-size:15px;border:1.5px solid transparent}
 .pill{display:inline-flex;align-items:center;gap:5px;border-radius:var(--radius-pill);padding:3px 10px;font-size:13px;font-weight:600}
</style></head><body><div class="wrap">
<div class="row">
  <button class="btn" style="background:var(--accent);color:var(--text-on-accent)">Primary</button>
  <button class="btn" style="background:var(--bg-surface);color:var(--text-primary);border-color:var(--border-default)">Secondary</button>
  <button class="btn" style="background:transparent;color:var(--accent)">Ghost</button>
  <button class="btn" style="background:var(--danger-bg);color:var(--danger-fg)">Cancel plan</button>
  <button class="btn" style="background:var(--accent);color:var(--text-on-accent);opacity:.5">Disabled</button>
</div>
<div class="lbl">Status badges (icon + label, colorblind-safe)</div>
<div class="row">
  <span class="pill" style="background:var(--success-bg);color:var(--success-fg)">✓ Active</span>
  <span class="pill" style="background:var(--warning-bg);color:var(--warning-fg)">● Due in 3d</span>
  <span class="pill" style="background:var(--danger-bg);color:var(--danger-fg)">! Overdue</span>
  <span class="pill" style="background:var(--info-bg);color:var(--info-fg)">‖ Paused</span>
  <span class="pill" style="background:var(--accent-soft);color:var(--accent-soft-fg)">★ Trial</span>
</div>
<div class="lbl">Segmented control</div>
<div class="row"><div style="display:flex;gap:2px;padding:3px;background:var(--bg-sunken);border-radius:var(--radius-md)">
  <span style="padding:8px 16px;border-radius:11px;background:var(--bg-surface);box-shadow:var(--shadow-xs);font-size:14px;font-weight:600">All</span>
  <span style="padding:8px 16px;font-size:14px;font-weight:600;color:var(--text-secondary)">Monthly</span>
  <span style="padding:8px 16px;font-size:14px;font-weight:600;color:var(--text-secondary)">Yearly</span>
</div></div>
</div></body></html>
