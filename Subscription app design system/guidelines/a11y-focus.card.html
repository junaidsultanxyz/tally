<!-- @dsCard group="Brand" viewport="700x140" name="Focus ring" subtitle="Always-visible keyboard focus" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:18px 20px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .col{display:flex;flex-direction:column;gap:10px;}
  .lbl{font-size:11px;color:var(--text-tertiary);letter-spacing:.04em;text-transform:uppercase;font-weight:600;}
  
</style>
</head>
<body><div class="wrap"><div class="row" style="gap:18px">
   <button style="font-family:inherit;font-weight:600;font-size:15px;padding:11px 20px;border-radius:var(--radius-pill);background:var(--accent);color:var(--text-on-accent);border:none;outline:var(--focus-ring-width) solid var(--focus-ring);outline-offset:var(--focus-ring-offset)">Focused button</button>
   <button style="font-family:inherit;font-weight:600;font-size:15px;padding:11px 20px;border-radius:var(--radius-pill);background:var(--bg-surface);color:var(--text-primary);border:1.5px solid var(--border-default)">Unfocused</button>
 </div></div></body>
</html>
