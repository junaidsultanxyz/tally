<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:18px 20px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .col{display:flex;flex-direction:column;gap:10px;}
  .lbl{font-size:11px;color:var(--text-tertiary);letter-spacing:.04em;text-transform:uppercase;font-weight:600;}
  
</style>
</head>
<body><div class="wrap"><div class="row" style="align-items:flex-end">
   <div class="col" style="gap:6px;align-items:center">
     <div style="width:var(--space-1);height:var(--space-1);background:var(--accent);border-radius:4px"></div>

   </div>
   <div class="col" style="gap:6px;align-items:center">
     <div style="width:var(--space-2);height:var(--space-2);background:var(--accent);border-radius:4px"></div>

   </div>
   <div class="col" style="gap:6px;align-items:center">
     <div style="width:var(--space-3);height:var(--space-3);background:var(--accent);border-radius:4px"></div>

   </div>

   </div>
   <div class="col" style="gap:6px;align-items:center">
     <div style="width:var(--space-6);height:var(--space-6);background:var(--accent);border-radius:4px"></div>

   </div></div></div></body>
