<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:18px 20px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .col{display:flex;flex-direction:column;gap:10px;}
  .lbl{font-size:11px;color:var(--text-tertiary);letter-spacing:.04em;text-transform:uppercase;font-weight:600;}
  
</style>
</head>
<body><div class="wrap"><div class="row">
   <div class="col" style="gap:6px;align-items:center">
     <div style="width:60px;height:48px;background:var(--accent-soft);border:1.5px solid var(--accent);border-radius:var(--radius-xs)"></div>
     <div style="font-size:11px;color:var(--text-tertiary);font-weight:600">xs · 6</div>
   </div>
   <div class="col" style="gap:6px;align-items:center">
     <div style="width:60px;height:48px;background:var(--accent-soft);border:1.5px solid var(--accent);border-radius:var(--radius-sm)"></div>
     <div style="font-size:11px;color:var(--text-tertiary);font-weight:600">sm · 10</div>
   </div>
   <div class="col" style="gap:6px;align-items:center">
     <div style="width:60px;height:48px;background:var(--accent-soft);border:1.5px solid var(--accent);border-radius:var(--radius-md)"></div>
     <div style="font-size:11px;color:var(--text-tertiary);font-weight:600">md · 14</div>
   </div>
   <div class="col" style="gap:6px;align-items:center">
     <div style="width:60px;height:48px;background:var(--accent-soft);border:1.5px solid var(--accent);border-radius:var(--radius-lg)"></div>
     <div style="font-size:11px;color:var(--text-tertiary);font-weight:600">lg · 18</div>
   </div>
   <div class="col" style="gap:6px;align-items:center">
     <div style="width:60px;height:48px;background:var(--accent-soft);border:1.5px solid var(--accent);border-radius:var(--radius-xl)"></div>
     <div style="font-size:11px;color:var(--text-tertiary);font-weight:600">xl · 24</div>
   </div>
   <div class="col" style="gap:6px;align-items:center">
     <div style="width:60px;height:48px;background:var(--accent-soft);border:1.5px solid var(--accent);border-radius:var(--radius-2xl)"></div>
     <div style="font-size:11px;color:var(--text-tertiary);font-weight:600">2xl · 32</div>
   </div></div></div></body>
</html>
