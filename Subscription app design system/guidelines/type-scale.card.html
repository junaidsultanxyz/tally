<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="Figtree — scales with Dynamic Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:18px 20px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .col{display:flex;flex-direction:column;gap:10px;}
  .lbl{font-size:11px;color:var(--text-tertiary);letter-spacing:.04em;text-transform:uppercase;font-weight:600;}
  
</style>
</head>
<body><div class="wrap"><div class="col" style="gap:8px">
   <div style="font-size:var(--fs-display);font-weight:700;line-height:1.1;letter-spacing:-.02em">Display 32</div>
   <div style="font-size:var(--fs-title);font-weight:700;line-height:1.15">Title 24</div>
   <div style="font-size:var(--fs-headline);font-weight:600">Headline 20</div>
   <div style="font-size:var(--fs-body-lg)">Body Large 17</div>
   <div style="font-size:var(--fs-body);color:var(--text-secondary)">Body 15 — default reading size</div>
   <div style="font-size:var(--fs-caption);color:var(--text-tertiary)">Caption 13</div>
 </div></div></body>
</html>
