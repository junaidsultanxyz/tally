<!-- @dsCard group="Brand" viewport="700x170" name="High-contrast mode" subtitle="Default vs high-contrast, same layout" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:18px 20px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .col{display:flex;flex-direction:column;gap:10px;}
  .lbl{font-size:11px;color:var(--text-tertiary);letter-spacing:.04em;text-transform:uppercase;font-weight:600;}
  
</style>
</head>
<body><div class="wrap"><div class="row" style="gap:16px">
   <div style="flex:1;min-width:240px;padding:14px;border-radius:var(--radius-lg);background:var(--bg-surface);border:1px solid var(--border-default)">
     <div style="font-weight:700;margin-bottom:4px">Default</div>
     <div style="color:var(--text-secondary);font-size:14px">Netflix renews in 3 days</div>
   </div>
   <div data-contrast="high" style="flex:1;min-width:240px;padding:14px;border-radius:var(--radius-lg);background:var(--bg-surface);border:1px solid var(--border-default)">
     <div style="font-weight:700;margin-bottom:4px;color:var(--text-primary)">High contrast</div>
     <div style="color:var(--text-secondary);font-size:14px">Netflix renews in 3 days</div>
   </div>
 </div></div></body>
</html>
