<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:18px 20px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .col{display:flex;flex-direction:column;gap:10px;}
  .lbl{font-size:11px;color:var(--text-tertiary);letter-spacing:.04em;text-transform:uppercase;font-weight:600;}
  
</style>
</head>
<body><div class="wrap"><div class="row" style="gap:16px;align-items:center">
   <div style="display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px;border-radius:var(--radius-md);background:var(--accent);color:var(--text-on-accent);font-weight:600;font-size:13px;padding:0 14px">44px</div>
   <div data-tap="large" style="display:flex;align-items:center;justify-content:center;min-width:var(--tap-min);min-height:var(--tap-min);border-radius:var(--radius-md);background:var(--accent-soft);color:var(--accent-soft-fg);font-weight:600;font-size:13px;padding:0 14px">52px (large)</div>
   <div class="lbl" style="max-width:180px;text-transform:none;font-size:12px;color:var(--text-secondary)">Every interactive element meets minimum size on both settings.</div>
 </div></div></body>
</html>
